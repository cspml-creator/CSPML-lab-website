<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect width="1000" height="500" fill="#111d35"/>
  <rect x="0" y="0" width="1000" height="500" fill="url(#grid)" opacity="0.4"/>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00c2ff" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>
  <circle cx="500" cy="210" r="60" fill="none" stroke="#00c2ff" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="500" cy="210" r="40" fill="none" stroke="#00c2ff" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="500" y1="150" x2="500" y2="270" stroke="#00c2ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="440" y1="210" x2="560" y2="210" stroke="#00c2ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <text x="500" y="320" font-family="sans-serif" font-size="16" fill="#8899bb" text-anchor="middle">Add photo to images/news/</text>
  <text x="500" y="345" font-family="sans-serif" font-size="13" fill="#445566" text-anchor="middle">Recommended size: 1000 × 500 px</text>
</svg>
